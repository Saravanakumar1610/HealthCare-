server:
  port: 8080

spring:
  application:
    name: healthcare-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: security-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: patient-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/patients/**, /api/dashboard/**
        - id: doctor-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/doctors/**
        - id: appointment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/appointments/**
        - id: billing-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/billings/**
        - id: pharmacy-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/pharmacy/**
