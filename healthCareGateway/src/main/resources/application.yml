spring:
  application:
    name: healthcare-gateway
  cloud:
    gateway:
      routes:
        # Route /api/login → localhost:8083/auth/login
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/login,/api/register
          filters:
            - StripPrefix=1  # Remove /api prefix before forwarding

        # Route /api/patients/** → localhost:8081/api/patients/**
        - id: patient-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1

        # Route /api/doctors/** → localhost:8082/api/doctors/**
        - id: doctor-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/doctors/**
          filters:
            - StripPrefix=1

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG