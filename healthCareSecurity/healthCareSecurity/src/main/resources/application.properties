spring.application.name=HealthCare Management

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/healthcare
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port (matches frontend expectation)
server.port=8081

# JWT Configuration
jwt.secret=mySuperSecretKeyForHealthcareApplication1234567890
jwt.expiration=86400000
