<!-- Toast Notifications (always visible) -->
<app-toast></app-toast>

<!-- Auth pages: full screen, no sidebar -->
@if (isAuthPage) {
  <router-outlet></router-outlet>
} @else {
  <!-- App Shell: Sidebar + Main Content -->
  <div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <i class='bx bx-plus-medical'></i>
        </div>
        <span class="brand-text">MedVault</span>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-dashboard'></i>
          <span>Dashboard</span>
        </a>
        <a routerLink="/patients" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-user-detail'></i>
          <span>Patients</span>
        </a>
        <a routerLink="/doctors" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-injection'></i>
          <span>Doctors</span>
        </a>
        <a routerLink="/appointments" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-calendar-check'></i>
          <span>Appointments</span>
        </a>
        <a routerLink="/billings" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-credit-card'></i>
          <span>Billings</span>
        </a>
        <a routerLink="/pharmacy" routerLinkActive="active" class="nav-item">
          <i class='bx bxs-capsule'></i>
          <span>Pharmacy</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">
            <i class='bx bxs-user-circle'></i>
          </div>
          <div class="user-info">
            <span class="user-name">{{ username }}</span>
            <span class="user-role">{{ userRole }}</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Top Bar -->
      <header class="topbar">
        <button class="topbar-toggle" (click)="toggleSidebar()">
          <i class='bx bx-menu'></i>
        </button>

        <div class="topbar-right">
          <span class="greeting">Welcome, <strong>{{ username }}</strong></span>
          <button class="btn btn-ghost btn-sm" (click)="logout()">
            <i class='bx bx-log-out'></i>
            Logout
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
}
